function tdec(ts){const d=Math.floor((Date.now()-ts)/60000);if(d<1)return"agora";if(d<60)return d+"min";return Math.floor(d/60)+"h"+d%60+"min";}
function tdur(a,b){const d=Math.floor((b-a)/60000);if(d<1)return"<1min";if(d<60)return d+"min";return Math.floor(d/60)+"h"+d%60+"min";}

function beep(ctx){if(!ctx)return;try{[[0,520,220],[0.5,520,220]].forEach(([delay,f1,f2])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type="square";o.frequency.setValueAtTime(f1,ctx.currentTime+delay);o.frequency.exponentialRampToValueAtTime(f2,ctx.currentTime+delay+0.35);g.gain.setValueAtTime(0,ctx.currentTime+delay);g.gain.linearRampToValueAtTime(0.9,ctx.currentTime+delay+0.02);g.gain.setValueAtTime(0.9,ctx.currentTime+delay+0.25);g.gain.linearRampToValueAtTime(0,ctx.currentTime+delay+0.38);o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+0.4);});}catch(_){}}
const efGrav=(g)=>{if(!g)return"leve";if((g.tcFila||0)>=5||(g.medFila||0)>=5||(g.triFila||0)>=5)return"critico";if((g.internados||0)>=5&&g.setor==="PA 2")return"critico";if(g.box10&&(g.internados||0)>=10&&g.setor==="PA 1")return"critico";if(g.tipo==="box10"&&g.box10Status==="ocupada_internado")return"critico";if(g.tipo==="box10"&&g.box10Status==="ocupada_pa")return"moderado";if(g.tipo==="box10"&&g.box10Status==="disponivel")return"leve";return g.gravidade||"leve";};

const CSS = `
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#06080f;--sf:#0d1120;--sf2:#131a2e;--bd:#1c2a45;--gold:#c9a84c;--gold2:#e8c97a;--tx:#e8eaf0;--tx2:#8a96b0;--gr:#22c55e;--yw:#f59e0b;--rd:#ef4444;--r:12px;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;width:100%;}
.app{min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;width:100%;}
.hdr{background:linear-gradient(135deg,#06080f,#0a1628);border-bottom:2px solid #c9a84c33;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-l{display:flex;align-items:center;gap:10px;}
.hdiv{width:1px;height:26px;background:#c9a84c44;}
.ht{font-size:14px;font-weight:700;color:#e8c97a;}
.hs{font-size:10px;color:var(--tx2);font-family:'JetBrains Mono';}
.live{display:flex;align-items:center;gap:5px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:20px;padding:4px 8px;font-size:10px;color:var(--gr);font-family:'JetBrains Mono';}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--gr);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.alert{background:#3b0a0a;border-bottom:2px solid #ef4444;padding:9px 14px;display:flex;align-items:center;gap:8px;}
.at{font-size:12px;font-weight:600;color:#fff;}
.sync{font-size:10px;color:var(--tx2);text-align:center;padding:5px;font-family:'JetBrains Mono';background:var(--sf);border-bottom:1px solid var(--bd);}
.tabs{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);overflow-x:auto;}
.tab{flex:1;min-width:56px;padding:9px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:500;color:var(--tx2);border-bottom:2px solid transparent;user-select:none;white-space:nowrap;}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,.05);}

function FilaWidget({n,numColor,borderColor,titulo,sub,ts,critico}){
  return(
    <div style={{borderRadius:"12px",padding:"10px 12px",marginBottom:"10px",display:"flex",alignItems:"center",gap:"10px",backgroundColor:"#06070d",border:`2px solid ${borderColor}`,boxShadow:critico?`0 0 14px ${borderColor}55`:"none",overflow:"hidden",minWidth:0}}>
      <div style={{textAlign:"center",minWidth:"58px",flexShrink:0}}>
        <div style={{fontSize:"38px",fontWeight:800,fontFamily:"JetBrains Mono,monospace",lineHeight:1,color:numColor}}>{n}</div>
        <div style={{fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.5px",marginTop:"3px",color:"#64748b"}}>pacientes</div>
      </div>
      <div style={{width:"1px",height:"44px",background:borderColor,flexShrink:0}}/>
      <div style={{flex:1,minWidth:0,overflow:"hidden"}}>
        <div style={{fontSize:"12px",fontWeight:700,color:"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{titulo}</div>
        {sub&&<div style={{fontSize:"11px",color:"#94a3b8",marginTop:"3px"}}>{sub}</div>}
        {ts&&<div style={{fontSize:"10px",color:"#475569",marginTop:"4px",fontFamily:"JetBrains Mono,monospace"}}>Atualizado: {fmtH(ts)}</div>}
      </div>
    </div>
  );
}

function PacModal({pac,onClose,onDel,onEdit}){
  const cat=CAT_PAC.find(c=>c.id===pac.cat)||CAT_PAC[0];
  return(
    <div className="ov" onClick={onClose}>
      <div className="mod" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:"16px",fontWeight:700,marginBottom:"4px"}}>{pac.nome}</div>
        <div style={{fontSize:"12px",color:"var(--tx2)",marginBottom:"16px"}}>{pac.diag||"—"}</div>
        <div className="mrow"><span className="mlb">Localização</span><span className="mvl">📍 {pac.pa} · {pac.box}</span></div>
        <div className="mrow"><span className="mlb">Categoria</span><span className="mvl" style={{color:cat.color}}>{cat.icon} {cat.label}</span></div>
        <div className="mrow"><span className="mlb">Registrado às</span><span className="mvl">{fmtH(pac.ts)}</span></div>
        <div className="mrow"><span className="mlb">Tempo no PA</span><span className="mvl">⏱ {tdec(pac.ts)}</span></div>
        {pac.por&&<div className="mrow"><span className="mlb">Por</span><span className="mvl">{pac.por}</span></div>}
        {pac.obs&&<div className="mrow"><span className="mlb">Obs.</span><span className="mvl" style={{fontSize:"12px",textAlign:"right",maxWidth:"60%"}}>{pac.obs}</span></div>}
        <div className="mact">

function FormPac({ini,onSave,onCancel}){
  const[nome,setNome]=useState(ini?.nome||"");
  const[pa,setPa]=useState(ini?.pa||"PA 1");
  const[box,setBox]=useState(ini?.box||"Box 1");
  const[cat,setCat]=useState(ini?.cat||"critico_uti");
  const[diag,setDiag]=useState(ini?.diag||"");
  const[obs,setObs]=useState(ini?.obs||"");
  const[por,setPor]=useState(ini?.por||"");
  const boxes=pa==="PA 1"?BOXES_PA1:BOXES_PA2;
  const save=()=>{if(!nome.trim())return;onSave({id:ini?.id||uid(),nome:nome.trim(),pa,box,cat,diag,obs,por,ts:ini?.ts||Date.now()});};
  return(
    <div className="card">
      <div className="ct">{ini?"Editar":"Adicionar Paciente"}</div>
      <div style={{marginBottom:"10px"}}><div className="ct" style={{marginBottom:"6px"}}>Identificação</div><input className="inp" placeholder="Ex: J.S." value={nome} onChange={e=>setNome(e.target.value)}/></div>
      <div style={{marginBottom:"10px"}}><div className="ct" style={{marginBottom:"6px"}}>Diagnóstico</div><input className="inp" placeholder="Ex: IAM, AVC..." value={diag} onChange={e=>setDiag(e.target.value)}/></div>
      <div style={{marginBottom:"10px"}}>
        <div className="ct" style={{marginBottom:"6px"}}>Categoria</div>
        <div className="g2">{CAT_PAC.map(c=>(
          <button key={c.id} onClick={()=>setCat(c.id)} style={{padding:"16px 10px",borderRadius:"10px",cursor:"pointer",textAlign:"center",border:`2px solid ${cat===c.id?c.color:"var(--bd)"}`,background:cat===c.id?c.color+"18":"var(--sf2)"}}>
            <div style={{fontSize:"24px",marginBottom:"4px"}}>{c.icon}</div>
            <div style={{fontSize:"12px",fontWeight:700,color:cat===c.id?c.color:"var(--tx)"}}>{c.label}</div>
            <div style={{fontSize:"10px",color:"var(--tx2)",marginTop:"2px"}}>{c.desc}</div>
          </button>
        ))}</div>
      </div>
      <div style={{marginBottom:"10px"}}>
        <div className="ct" style={{marginBottom:"6px"}}>Localização</div>
        <div className="g2" style={{marginBottom:"8px"}}>{["PA 1","PA 2"].map(p=><button key={p} className={"ob"+(pa===p?" on":"")} onClick={()=>{setPa(p);setBox("Box 1");}}>{p}</button>)}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"5px"}}>{boxes.map(b=><button key={b} className={"ob"+(box===b?" on":"")} onClick={()=>setBox(b)} style={{padding:"7px 4px",fontSize:"11px"}}>{b}</button>)}</div>
      </div>
      <div style={{marginBottom:"10px"}}><div className="ct" style={{marginBottom:"6px"}}>Observação</div><textarea className="ta" placeholder="Pendências..." value={obs} onChange={e=>setObs(e.target.value)}/></div>
      <div style={{marginBottom:"12px"}}>
        <div className="ct" style={{marginBottom:"6px"}}>Registrado por</div>
        <select className="sel" value={por} onChange={e=>setPor(e.target.value)}><option value="">Selecione...</option>{USUARIOS.map(u=><option key={u}>{u}</option>)}</select>
      </div>
      <div className="g2">
        <button className="mcls" style={{padding:"12px"}} onClick={onCancel}>Cancelar</button>
        <button className="btn" disabled={!nome.trim()} onClick={save} style={{fontSize:"14px"}}>Salvar</button>
      </div>
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("registro");
  const[gargs,setGargs]=useState([]);
  const[pacs,setPacs]=useState([]);
  const[filtro,setFiltro]=useState("todos");
  const[showOk,setShowOk]=useState(false);
  const[som,setSom]=useState(true);
  const[actx,setActx]=useState(null);
  const[lastSync,setLastSync]=useState(null);
  const[fbReady,setFbReady]=useState(false);
  const prevCrit=useRef(0);
  const prevAutoRef=useRef(false);
  const[user,setUser]=useState("");
  const[setor,setSetor]=useState("");
  const[tipo,setTipo]=useState("");
  const[grav,setGrav]=useState("");
  const[intern,setIntern]=useState(0);
  const[obs,setObs]=useState("");
  const[tcFila,setTcFila]=useState(0);
  const[tcStatus,setTcStatus]=useState("");
  const[medFila,setMedFila]=useState(0);
  const[medStatus,setMedStatus]=useState("");
  const[medMotivo,setMedMotivo]=useState([]);
  const[triFila,setTriFila]=useState(0);
  const[triStatus,setTriStatus]=useState("");
  const[box10,setBox10]=useState(false);
  const[box10Status,setBox10Status]=useState("");
  const[modalPac,setModalPac]=useState(null);
  const[editPac,setEditPac]=useState(null);
  const[addPac,setAddPac]=useState(false);
  const[fpaPac,setFpaPac]=useState("todos");
  const[,setTick]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setTick(n=>n+1),30000);return()=>clearInterval(t);},[]);

  useEffect(()=>{
    const init=()=>{
      setFbReady(true);
      const {collection,onSnapshot,query,orderBy}=window.__fb;
      const db=window.__db;
      const qG=query(collection(db,"gargalos"),orderBy("timestamp","desc"));
      onSnapshot(qG,snap=>{setGargs(snap.docs.map(d=>({...d.data(),fbId:d.id})));setLastSync(Date.now());});
      const qP=query(collection(db,"pacientes"),orderBy("ts","desc"));
      onSnapshot(qP,snap=>{setPacs(snap.docs.map(d=>({...d.data(),fbId:d.id})));});
    };
    if(window.__db)init();
    else window.addEventListener("fb-ready",init,{once:true});
  },[]);

  const initAudio=useCallback(()=>{
    if(!actx){try{const c=new(window.AudioContext||window.webkitAudioContext)();if(c.state==="suspended")c.resume();setActx(c);}catch(_){}}
    else if(actx.state==="suspended"){actx.resume();}
  },[actx]);

  const ativos=gargs.filter(g=>!g.resolvido);
  // For counting and widgets: deduplicate — keep only latest per setor+tipo
  const ativosDedup=(()=>{
    const seen=new Map();
    // ativos is already sorted by timestamp desc (Firebase orderBy desc)
    ativos.forEach(g=>{
      const key=g.setor+"||"+g.tipo;
      if(!seen.has(key))seen.set(key,g);
    });
    return Array.from(seen.values());
  })();
  const resolvidos=gargs.filter(g=>g.resolvido);
  // PA1 box10: find the single most recent PA1 "emergency situation" entry
  // Could be: standalone box10 registro OR internados with box10 toggle
  const latestPA1Box10=ativosDedup.find(g=>g.tipo==="box10"&&g.setor==="PA 1");
  const latestPA1Int=ativosDedup.find(g=>g.tipo==="internados_bloqueando"&&g.setor==="PA 1");
  // Determine PA1 emergency status from MOST RECENT of the two
  const pa1EmergTS=Math.max(latestPA1Box10?.timestamp||0, latestPA1Int?.timestamp||0);
  const pa1EmergSource=pa1EmergTS===(latestPA1Box10?.timestamp||0)&&latestPA1Box10?latestPA1Box10:latestPA1Int;
  const pa1EmergStatus=(()=>{
    if(!pa1EmergSource)return"none";
    if(pa1EmergSource.tipo==="box10")return pa1EmergSource.box10Status||"none";
    if(pa1EmergSource.box10&&(pa1EmergSource.internados||0)>=10)return"ocupada_internado";
    return"none";
  })();
  const pa1IsCrit=pa1EmergStatus==="ocupada_internado";
  const pa1IsMod=pa1EmergStatus==="ocupada_pa";
  // Exclude ALL PA1 box10-related entries from general counts — count as 1 below
  const ativosForCount=ativosDedup.filter(g=>
    !(g.tipo==="box10"&&g.setor==="PA 1")&&
    !(g.tipo==="internados_bloqueando"&&g.setor==="PA 1"&&g.box10)
  );
  const nCrit=ativosForCount.filter(g=>efGrav(g)==="critico").length+(pa1IsCrit?1:0);
  const nMod=ativosForCount.filter(g=>efGrav(g)==="moderado").length+(pa1IsMod?1:0);
  const nInt=ativosDedup.filter(g=>g.tipo==="internados_bloqueando").reduce((s,g)=>s+(g.internados||0),0);
  const tcAtivo=ativosDedup.filter(g=>g.setor==="Tomografia"&&(g.tcFila||0)>0).sort((a,b)=>b.timestamp-a.timestamp);
  const tcMax=tcAtivo.length>0?tcAtivo[0].tcFila:0;
  const medAtivo=ativosDedup.filter(g=>g.setor==="Medicação"&&(g.medFila||0)>0).sort((a,b)=>b.timestamp-a.timestamp);
  const medMax=medAtivo.length>0?medAtivo[0].medFila:0;
  const triAtivo=ativosDedup.filter(g=>g.setor==="Triagem"&&(g.triFila||0)>0).sort((a,b)=>b.timestamp-a.timestamp);
  const triMax=triAtivo.length>0?triAtivo[0].triFila:0;
  const intAtivo=ativosDedup.filter(g=>g.tipo==="internados_bloqueando"&&(g.internados||0)>0).sort((a,b)=>b.timestamp-a.timestamp);
  const intAtivoPA2=intAtivo.filter(g=>g.setor==="PA 2");
  const intAtivoPA1=intAtivo.filter(g=>g.setor==="PA 1");
  const intMaxPA2=intAtivoPA2.length>0?intAtivoPA2[0].internados:0;
  const intMaxPA1=intAtivoPA1.length>0?intAtivoPA1[0].internados:0;
  const intMax=intAtivo.length>0?intAtivo[0].internados:0;
  const tcCrit=tcMax>=5,medCrit=medMax>=5,triCrit=triMax>=5,intCrit=intMaxPA2>=5||(intAtivoPA1[0]?.box10&&intMaxPA1>=10);
  const anyAuto=tcCrit||medCrit||triCrit||intCrit;
  useEffect(()=>{if(nCrit>prevCrit.current&&som&&actx)beep(actx);prevCrit.current=nCrit;},[nCrit,som,actx]);
  useEffect(()=>{if(anyAuto&&!prevAutoRef.current&&som&&actx)beep(actx);prevAutoRef.current=anyAuto;},[anyAuto,som,actx]);

  const gFilt=ativos.filter(g=>{
    if(filtro==="todos")return true;
    if(filtro==="critico")return efGrav(g)==="critico";
    if(filtro==="moderado")return efGrav(g)==="moderado";
    if(filtro==="internados")return g.tipo==="internados_bloqueando";
    return g.setor===filtro;
  }).sort((a,b)=>({critico:0,moderado:1,leve:2}[efGrav(a)]-{critico:0,moderado:1,leve:2}[efGrav(b)]));

  const isTcS=setor==="Tomografia",isMedS=setor==="Medicação",isTriS=setor==="Triagem",isBox10=setor==="PA 1"&&tipo==="box10";

  const submit=async()=>{
    if(!user||!setor)return;
    if(!isTcS&&!isMedS&&!isTriS&&!isBox10&&(!tipo||((!grav)&&!autoGrav)))return;
    if(isTcS&&!tcStatus)return;
    if(isMedS&&!medStatus)return;
    if(isTriS&&!triStatus)return;
    if(isBox10&&!box10Status)return;
    initAudio();
    const tipoF=isTcS?"exame_pendente":isMedS?"falta_vaga_medicacao":isTriS?"falta_pessoal":isBox10?"box10":tipo;
    const gravF=isTcS?(ST_TC.find(s=>s.id===tcStatus)?.grav||"moderado"):isMedS?(ST_MED.find(s=>s.id===medStatus)?.grav||"moderado"):isTriS?(ST_TRI.find(s=>s.id===triStatus)?.grav||"moderado"):isBox10?(box10Status==="ocupada_internado"?"critico":box10Status==="ocupada_pa"?"moderado":"leve"):autoGrav?"critico":grav;
    try{
      const {collection,addDoc}=window.__fb;
      await addDoc(collection(window.__db,"gargalos"),{setor,tipo:tipoF,gravidade:gravF,internados:tipo==="internados_bloqueando"?intern:0,obs,usuario:user,timestamp:Date.now(),resolvido:false,tsRes:null,tcFila:isTcS?tcFila:0,tcStatus:isTcS?tcStatus:"",medFila:isMedS?medFila:0,medStatus:isMedS?medStatus:"",medMotivo:isMedS?[...medMotivo]:[],triFila:isTriS?triFila:0,triStatus:isTriS?triStatus:"",box10:tipo==="internados_bloqueando"&&setor==="PA 1"?box10:false,box10Status:setor==="PA 1"&&tipo==="box10"?box10Status:""});
      setSetor("");setTipo("");setGrav("");setIntern(0);setObs("");setTcFila(0);setTcStatus("");setMedFila(0);setMedStatus("");setMedMotivo([]);setTriFila(0);setTriStatus("");setBox10(false);setBox10Status("");
      setShowOk(true);setTimeout(()=>setShowOk(false),3000);
      setTab("painel");
    }catch(e){alert("Erro ao salvar. Verifique conexão.");}
  };

  const resolver=async(fbId)=>{try{const {doc,updateDoc}=window.__fb;await updateDoc(doc(window.__db,"gargalos",fbId),{resolvido:true,tsRes:Date.now()});}catch(_){}};
  const reverter=async(fbId)=>{try{const {doc,updateDoc}=window.__fb;await updateDoc(doc(window.__db,"gargalos",fbId),{resolvido:false,tsRes:null});}catch(_){}};
  const tinfo=id=>{if(id==="box10")return{label:"Sala de Emergência (Box 10)",icon:"🏥"};return TIPOS.find(t=>t.id===id)||{label:id,icon:"⚠️"};};
  const autoGrav=(tipo==="internados_bloqueando"&&setor==="PA 2"&&intern>=5)||(tipo==="internados_bloqueando"&&setor==="PA 1"&&intern>=10&&box10);const canSub=fbReady&&user&&setor&&(isTcS?tcStatus:isMedS?medStatus:isTriS?triStatus:isBox10?box10Status:(tipo&&(grav||autoGrav)));

  const savePac=async(p)=>{
    try{
      const {collection,addDoc,doc,updateDoc}=window.__fb;
      if(p.fbId){const {fbId,...d}=p;await updateDoc(doc(window.__db,"pacientes",fbId),d);}
      else{await addDoc(collection(window.__db,"pacientes"),p);}
      setAddPac(false);setEditPac(null);
    }catch(_){alert("Erro ao salvar paciente.");}
  };
  const delPac=async(fbId)=>{
    try{const {doc,deleteDoc}=window.__fb;await deleteDoc(doc(window.__db,"pacientes",fbId));setModalPac(null);}catch(_){}
  };

  const g24=gargs.filter(g=>g.timestamp>=Date.now()-86400000);

      [esc("Criticos UTI ativos"),pacs.filter(p=>p.cat==="critico_uti").length,"","","","","","","","","",""].join(sep),
      [esc("Recomendados ativos"),pacs.filter(p=>p.cat==="recomendado").length,"","","","","","","","","",""].join(sep),
      ["","","","","","","","","","","",""].join(sep),
      ["DETALHAMENTO","","","","","","","","","","",""].join(sep),
      header,
      ...linhas,
    ];
    const bom="﻿";
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([bom+resumo.join("\n")],{type:"text/csv;charset=utf-8"}));
    a.download=`relatorio-dfstar-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  return(<>
    <style>{CSS}</style>
    <div className="app" onClick={initAudio}>
      <div className="hdr">
        <div className="hdr-l">
          <img src={LOGO} alt="DF Star" style={{height:"34px",objectFit:"contain"}}/>

          <div><div className="ht">Monitor de Gargalos</div><div className="hs">PA · Hospital DF Star</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
          <button className={"sbtn"+(som?" on":"")} onClick={()=>setSom(v=>!v)}>{som?"🔔":"🔕"}</button>
          <button className="sbtn" onClick={()=>{initAudio();setTimeout(()=>actx&&beep(actx),200);}}>🔊</button>
          <div className="live"><div className="ldot"/>{fbReady?"AO VIVO":"..."}</div>
        </div>
      </div>

      {lastSync&&<div className="sync">🔄 Sync: {fmtH(lastSync)} · {ativos.length} ativos · {pacs.length} pac.</div>}

      {(()=>{if(nCrit===0)return null;const det=[triCrit?`Triagem: ${triMax}`:null,tcCrit?`TC: ${tcMax}`:null,medCrit?`Med: ${medMax}`:null,intCrit?`Internados: ${intMax}`:null].filter(Boolean);return(<div className="alert"><span>🚨</span><span className="at"><strong>{nCrit} crítico{nCrit>1?"s":""}</strong>{det.length>0?" — "+det.join(" · "):""}</span></div>);})()}

      <div className="tabs">
        {[{id:"registro",i:"📝",l:"Registrar"},{id:"painel",i:"📊",l:"Painel",b:nCrit||null},{id:"pacientes",i:"🏥",l:"Pacientes",b:pacs.filter(p=>p.cat==="critico_uti").length||null},{id:"historico",i:"🗂️",l:"Histórico"},{id:"relatorio",i:"📋",l:"Relatório"}].map(t=>(
          <div key={t.id} className={"tab"+(tab===t.id?" on":"")} onClick={()=>setTab(t.id)}>
            <span className="ti">{t.i}</span>{t.l}{t.b?<span className="nb">{t.b}</span>:null}
          </div>
        ))}
      </div>

      <div className="cnt">
        {tab==="registro"&&<>
          {showOk&&<div className="ok">✅ Registrado e sincronizado!</div>}

          <div className="card"><div className="ct">Quem está registrando?</div>
            <select className="sel" value={user} onChange={e=>setUser(e.target.value)}><option value="">Selecione seu perfil...</option>{USUARIOS.map(u=><option key={u}>{u}</option>)}</select>
          </div>
          <div className="card"><div className="ct">Onde está o problema?</div>
            <div className="g2">{SETORES.map(s=><button key={s} className={"ob"+(setor===s?" on":"")} onClick={()=>{setSetor(s);setTipo("");setGrav("");setTcStatus("");setMedStatus("");setTriStatus("");}}>{s}</button>)}</div>
          </div>
          {setor&&!isTcS&&!isMedS&&!isTriS&&<>
            <div className="card"><div className="ct">Qual é o gargalo?</div>
              {setor==="PA 1"&&<button className={"ob"+(tipo==="box10"?" on":"")} onClick={()=>setTipo("box10")} style={{display:"flex",alignItems:"center",gap:"10px",width:"100%",textAlign:"left",marginBottom:"5px",padding:"11px 12px",borderColor:tipo==="box10"?"#ef4444":"var(--bd)",background:tipo==="box10"?"rgba(239,68,68,.12)":"var(--sf2)",color:tipo==="box10"?"#ef4444":"var(--tx2)"}}><span style={{fontSize:"18px"}}>🏥</span><span>Sala de Emergência (Box 10)</span></button>}
              {TIPOS.map(t=><button key={t.id} className={"ob"+(tipo===t.id?" on":"")} onClick={()=>setTipo(t.id)} style={{display:"flex",alignItems:"center",gap:"10px",width:"100%",textAlign:"left",marginBottom:"5px",padding:"11px 12px"}}><span style={{fontSize:"18px"}}>{t.icon}</span><span>{t.label}</span></button>)}
            </div>
            {tipo==="internados_bloqueando"&&<div className="card"><div className="ct">🛏️ Quantos internados aguardando leito?</div>
              {intern>=5&&setor==="PA 2"&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:"8px",padding:"8px 12px",marginBottom:"10px",fontSize:"12px",color:"#fca5a5",fontWeight:600}}>🚨 ≥5 internados no PA 2 — situação crítica</div>}

              {setor==="PA 1"&&<>
                <div style={{marginTop:"14px",marginBottom:"6px"}}>
                  <div className="ct" style={{marginBottom:"8px"}}>🚨 Box 10 (Sala de Emergência)</div>
                  <div className="g2">
                    <button onClick={()=>setBox10(false)} style={{padding:"12px",borderRadius:"10px",cursor:"pointer",textAlign:"center",border:`2px solid ${!box10?"#22c55e":"var(--bd)"}`,background:!box10?"rgba(34,197,94,.12)":"var(--sf2)"}}>
                      <div style={{fontSize:"20px",marginBottom:"3px"}}>✅</div>
                      <div style={{fontSize:"12px",fontWeight:700,color:!box10?"#22c55e":"var(--tx2)"}}>Disponível</div>
                    </button>
                    <button onClick={()=>setBox10(true)} style={{padding:"12px",borderRadius:"10px",cursor:"pointer",textAlign:"center",border:`2px solid ${box10?"#ef4444":"var(--bd)"}`,background:box10?"rgba(239,68,68,.12)":"var(--sf2)"}}>
                      <div style={{fontSize:"20px",marginBottom:"3px"}}>🚨</div>
                      <div style={{fontSize:"12px",fontWeight:700,color:box10?"#ef4444":"var(--tx2)"}}>Ocupado por internado</div>
                    </button>
                  </div>
                </div>
                {box10&&intern>=10&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:"8px",padding:"8px 12px",marginTop:"8px",fontSize:"12px",color:"#fca5a5",fontWeight:600}}>🚨 PA 1 sem retaguarda de emergência — todos os boxes ocupados</div>}
              </>}</div>}
            {!isBox10&&!(tipo==="internados_bloqueando"&&setor==="PA 2"&&intern>=5)&&!(tipo==="internados_bloqueando"&&setor==="PA 1"&&intern>=10&&box10)&&<div className="card"><div className="ct">Gravidade</div><div className="g3">{GRAVS.map(g=><button key={g.id} className="gb" onClick={()=>setGrav(g.id)} style={{borderColor:grav===g.id?g.color:"var(--bd)",background:grav===g.id?g.color+"22":"var(--sf2)",color:grav===g.id?g.color:"var(--tx2)"}}>{g.label}</button>)}</div></div>}
              {tipo==="internados_bloqueando"&&setor==="PA 2"&&intern>=5&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:"10px",padding:"12px",marginBottom:"12px",textAlign:"center"}}><div style={{fontSize:"12px",color:"#fca5a5",fontWeight:700}}>🚨 Gravidade definida automaticamente: CRÍTICO</div><div style={{fontSize:"11px",color:"#94a3b8",marginTop:"4px"}}>≥5 internados no PA 2</div></div>}
              {tipo==="internados_bloqueando"&&setor==="PA 1"&&intern>=10&&box10&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:"10px",padding:"12px",marginBottom:"12px",textAlign:"center"}}><div style={{fontSize:"12px",color:"#fca5a5",fontWeight:700}}>🚨 Gravidade definida automaticamente: CRÍTICO</div><div style={{fontSize:"11px",color:"#94a3b8",marginTop:"4px"}}>≥10 internados + Box 10 ocupado no PA 1</div></div>}
              {isBox10&&<div className="card">
                <div className="ct">🏥 Status do Box 10 — Sala de Emergência</div>
                {STATUS_BOX10.map(s=>(
                  <button key={s.id} onClick={()=>setBox10Status(s.id)}
                    style={{display:"flex",alignItems:"center",gap:"12px",width:"100%",textAlign:"left",marginBottom:"8px",padding:"13px 14px",borderRadius:"10px",cursor:"pointer",
                      border:`2px solid ${box10Status===s.id?s.color:"var(--bd)"}`,
                      background:box10Status===s.id?s.color+"18":"var(--sf2)"}}>
                    <span style={{fontSize:"22px"}}>{s.icon}</span>
                    <div>
                      <div style={{fontSize:"13px",fontWeight:700,color:box10Status===s.id?s.color:"var(--tx)"}}>{s.label}</div>
                      <div style={{fontSize:"11px",color:"var(--tx2)",marginTop:"2px"}}>{s.desc}</div>
                    </div>
                  </button>
                ))}
                {box10Status==="ocupada_internado"&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:"8px",padding:"8px 12px",marginTop:"4px",fontSize:"12px",color:"#fca5a5",fontWeight:600}}>🚨 Gravidade: CRÍTICO — sem retaguarda de emergência</div>}
                {box10Status==="ocupada_pa"&&<div style={{background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",borderRadius:"8px",padding:"8px 12px",marginTop:"4px",fontSize:"12px",color:"#fbbf24",fontWeight:600}}>⚠️ Gravidade: MODERADO — Box 10 em uso</div>}
              </div>}
          </>}
          {isTriS&&<>
            <div className="card"><div className="ct">🏷️ Status da triagem</div><div className="g2">{ST_TRI.map(s=><button key={s.id} onClick={()=>setTriStatus(s.id)} style={{padding:"16px 10px",borderRadius:"10px",cursor:"pointer",textAlign:"center",border:`2px solid ${triStatus===s.id?s.color:"var(--bd)"}`,background:triStatus===s.id?s.color+"18":"var(--sf2)"}}><div style={{fontSize:"26px",marginBottom:"4px"}}>{s.icon}</div><div style={{fontSize:"13px",fontWeight:700,color:triStatus===s.id?s.color:"var(--tx)"}}>{s.label}</div><div style={{fontSize:"10px",color:"var(--tx2)",marginTop:"3px"}}>{s.desc}</div></button>)}</div></div>
            {triStatus&&<div className="card"><div className="ct">🔢 Pacientes aguardando triagem</div>{triFila>=5&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:"8px",padding:"8px 12px",marginBottom:"10px",fontSize:"12px",color:"#fca5a5",fontWeight:600}}>🚨 ≥5 pac. — considere abrir a 2ª triagem</div>}<div className="cr"><button className="cb" onClick={()=>setTriFila(Math.max(0,triFila-1))}>−</button><div style={{fontSize:"40px",fontWeight:800,fontFamily:"JetBrains Mono",color:triFila>=5?"#ef4444":"#22c55e",minWidth:"52px",textAlign:"center"}}>{triFila}</div><button className="cb" onClick={()=>setTriFila(triFila+1)}>+</button><span style={{fontSize:"12px",color:"var(--tx2)"}}>na triagem</span></div></div>}
          </>}
          {isMedS&&<>
            <div className="card"><div className="ct">💊 Status da medicação</div><div className="g2">{ST_MED.map(s=><button key={s.id} onClick={()=>{setMedStatus(s.id);if(s.id==="normal")setMedMotivo([]);}} style={{padding:"16px 10px",borderRadius:"10px",cursor:"pointer",textAlign:"center",border:`2px solid ${medStatus===s.id?s.color:"var(--bd)"}`,background:medStatus===s.id?s.color+"18":"var(--sf2)"}}><div style={{fontSize:"26px",marginBottom:"4px"}}>{s.icon}</div><div style={{fontSize:"13px",fontWeight:700,color:medStatus===s.id?s.color:"var(--tx)"}}>{s.label}</div><div style={{fontSize:"10px",color:"var(--tx2)",marginTop:"3px"}}>{s.desc}</div></button>)}</div></div>
            {medStatus==="atrasado"&&<div className="card"><div className="ct">⚠️ Motivo <span style={{fontWeight:400,fontSize:"10px",textTransform:"none",letterSpacing:0}}>(pode marcar mais de um)</span></div>{MOT_MED.map(m=>{const sel=medMotivo.includes(m.id);const tog=()=>setMedMotivo(p=>sel?p.filter(x=>x!==m.id):[...p,m.id]);return(<button key={m.id} onClick={tog} style={{display:"flex",alignItems:"center",gap:"10px",width:"100%",textAlign:"left",marginBottom:"7px",padding:"12px 14px",borderRadius:"10px",cursor:"pointer",border:`1.5px solid ${sel?"#f59e0b":"var(--bd)"}`,background:sel?"rgba(245,158,11,.12)":"var(--sf2)"}}><span style={{fontSize:"14px",minWidth:"22px",textAlign:"center",background:sel?"#f59e0b":"var(--bd)",borderRadius:"5px",padding:"2px 5px",color:sel?"#06080f":"var(--tx2)",fontWeight:700}}>{sel?"✓":m.icon}</span><span style={{fontSize:"13px",fontWeight:600,color:sel?"#f59e0b":"var(--tx)"}}>{m.label}</span></button>);})}</div>}
            {medStatus&&<div className="card"><div className="ct">🔢 Pacientes aguardando medicação</div>{medFila>=5&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:"8px",padding:"8px 12px",marginBottom:"10px",fontSize:"12px",color:"#fca5a5",fontWeight:600}}>🚨 ≥5 pac. — atenção à fila</div>}<div className="cr"><button className="cb" onClick={()=>setMedFila(Math.max(0,medFila-1))}>−</button><div style={{fontSize:"40px",fontWeight:800,fontFamily:"JetBrains Mono",color:medFila>=5?"#ef4444":"#f59e0b",minWidth:"52px",textAlign:"center"}}>{medFila}</div><button className="cb" onClick={()=>setMedFila(medFila+1)}>+</button><span style={{fontSize:"12px",color:"var(--tx2)"}}>na fila</span></div></div>}
          </>}
          {isTcS&&<>
            <div className="card"><div className="ct">🔬 Status dos tomógrafos</div>{ST_TC.map(s=><button key={s.id} onClick={()=>setTcStatus(s.id)} style={{display:"flex",alignItems:"center",gap:"12px",width:"100%",textAlign:"left",marginBottom:"8px",padding:"14px",borderRadius:"10px",cursor:"pointer",border:`2px solid ${tcStatus===s.id?s.color:"var(--bd)"}`,background:tcStatus===s.id?s.color+"18":"var(--sf2)"}}><span style={{fontSize:"26px"}}>{s.icon}</span><div><div style={{fontSize:"13px",fontWeight:700,color:tcStatus===s.id?s.color:"var(--tx)"}}>{s.label}</div><div style={{fontSize:"11px",color:"var(--tx2)",marginTop:"2px"}}>{s.desc}</div></div></button>)}</div>
            {tcStatus&&<div className="card"><div className="ct">🔢 Pacientes aguardando tomografia</div>{tcFila>=5&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:"8px",padding:"8px 12px",marginBottom:"10px",fontSize:"12px",color:"#fca5a5",fontWeight:600}}>🚨 ≥5 pac. — fila crítica</div>}<div className="cr"><button className="cb" onClick={()=>setTcFila(Math.max(0,tcFila-1))}>−</button><div style={{fontSize:"40px",fontWeight:800,fontFamily:"JetBrains Mono",color:tcFila>=5?"#ef4444":"#06b6d4",minWidth:"52px",textAlign:"center"}}>{tcFila}</div><button className="cb" onClick={()=>setTcFila(tcFila+1)}>+</button><span style={{fontSize:"12px",color:"var(--tx2)"}}>na fila TC</span></div></div>}
          </>}
          <div className="card"><div className="ct">Observação (opcional)</div><textarea className="ta" placeholder="Detalhes adicionais..." value={obs} onChange={e=>setObs(e.target.value)}/></div>

        </>}

        {tab==="painel"&&<>
          <div className="sr">
            <div className="sc" style={{borderTop:"2px solid var(--rd)"}}><div className="sv" style={{color:"var(--rd)"}}>{nCrit}</div><div className="sl">Críticos</div></div>
            <div className="sc" style={{borderTop:"2px solid var(--yw)"}}><div className="sv" style={{color:"var(--yw)"}}>{nMod}</div><div className="sl">Moderados</div></div>
            <div className="sc" style={{borderTop:"2px solid #fbbf24"}}><div className="sv" style={{color:"#fbbf24"}}>{nInt}</div><div className="sl">Internados</div></div>
          </div>
          {(()=>{
            // ── Build widgets ─────────────────────────────────────────
            // Check if PA1 has a combined internados+box10 critical situation
            const pa1CombCrit=(intAtivoPA1[0]?.box10&&intMaxPA1>=10)||pa1IsCrit;
            // Check for standalone box10 registration (tipo==="box10")
            const b10Reg=latestPA1Box10&&latestPA1Box10.box10Status&&latestPA1Box10.box10Status!=="disponivel"?latestPA1Box10:null;

            // PA1 internados widget — merge with box10 info if applicable
            const pa1Widget=(()=>{
              if(intMaxPA1<=0&&!b10Reg)return null;
              // If combined critical (internados+box10 toggled inside internados form)
              if(pa1CombCrit){
                return{crit:true,n:intMaxPA1,numColor:"#ef4444",borderColor:"#ef4444",
                  titulo:"🏥 PA 1 — Sem retaguarda · Box 10 ocupado com internado",
                  sub:`${intMaxPA1} internados · todos os boxes ocupados`,ts:intAtivoPA1[0]?.timestamp};
              }
              // If standalone box10 registration
              if(b10Reg&&intMaxPA1<=0){
                return{crit:b10Reg.box10Status==="ocupada_internado",n:null,
                  numColor:b10Reg.box10Status==="ocupada_internado"?"#ef4444":"#f59e0b",
                  borderColor:b10Reg.box10Status==="ocupada_internado"?"#ef4444":"#f59e0b55",
                  titulo:b10Reg.box10Status==="ocupada_internado"
                    ?"🏥 PA 1 · Box 10 — Ocupado com internado aguardando leito"
                    :"🏥 PA 1 · Box 10 — Ocupado com paciente de atendimento PA",
                  sub:b10Reg.box10Status==="ocupada_internado"?"⚠️ Sem retaguarda de emergência":"⚠️ Sala de emergência em uso",
                  ts:b10Reg.timestamp};
              }
              // If both exist separately, only merge if b10Reg is newer than latest internados
              if(b10Reg&&intMaxPA1>0){
                const b10IsNewer=b10Reg.timestamp>=(intAtivoPA1[0]?.timestamp||0);
                if(b10IsNewer){
                  const isCrit=b10Reg.box10Status==="ocupada_internado";
                  return{crit:isCrit,n:intMaxPA1,
                    numColor:isCrit?"#ef4444":"#f59e0b",
                    borderColor:isCrit?"#ef4444":"#f59e0b55",
                    titulo:isCrit
                      ?"🏥 PA 1 — Sem retaguarda · Box 10 ocupado com internado"
                      :"🏥 PA 1 · Box 10 ocupado com paciente de atendimento PA",
                    sub:isCrit?`${intMaxPA1} internados · sem retaguarda de emergência`:`${intMaxPA1} internados · sala de emergência em uso`,
                    ts:b10Reg.timestamp};
                }
              }
              // Just internados PA1, no box10 issue
              return{crit:false,n:intMaxPA1,numColor:"#94a3b8",borderColor:"#1c2a45",
                titulo:"🛏️ Internados PA 1",ts:intAtivoPA1[0]?.timestamp,sub:undefined};
            })();

            const filaWidgets=[
              triMax>0?{crit:triCrit,n:triMax,numColor:triCrit?"#ef4444":"#f59e0b",borderColor:triCrit?"#ef4444":"#f59e0b55",titulo:triCrit?"🏷️ Triagem — ABRIR 2ª TRIAGEM":"🏷️ Fila de Triagem",ts:triAtivo[0]?.timestamp}:null,
              intMaxPA2>0?{crit:intCrit,n:intMaxPA2,numColor:intCrit?"#ef4444":"#f59e0b",borderColor:intCrit?"#ef4444":"#f59e0b55",titulo:intCrit?"🛏️ Internados PA 2 — CRÍTICO":"🛏️ Internados PA 2",ts:intAtivoPA2[0]?.timestamp}:null,
              pa1Widget,
              medMax>0?{crit:medCrit,n:medMax,numColor:medCrit?"#ef4444":"#f59e0b",borderColor:medCrit?"#ef4444":"#f59e0b55",titulo:medCrit?"💊 Medicação — CRÍTICO":"💊 Fila de Medicação",sub:medAtivo[0]?.medMotivo?.length>0?medAtivo[0].medMotivo.map(id=>MOT_MED.find(m=>m.id===id)?.label).filter(Boolean).join(" · "):undefined,ts:medAtivo[0]?.timestamp}:null,
              tcMax>0?{crit:tcCrit,n:tcMax,numColor:tcCrit?"#ef4444":"#f59e0b",borderColor:tcCrit?"#ef4444":"#f59e0b55",titulo:tcCrit?"🔬 Tomografia — CRÍTICO":"🔬 Fila de Tomografia",sub:tcAtivo[0]?.tcStatus?ST_TC.find(s=>s.id===tcAtivo[0].tcStatus)?.label:undefined,ts:tcAtivo[0]?.timestamp}:null,
            ].filter(Boolean);

            // Generic gargalo widgets — exclude PA1 internados and box10 (already handled above)
            const filaSetores=["Tomografia","Medicação","Triagem"];
            const gargaloWidgets=ativosDedup
              .filter(g=>efGrav(g)==="critico"
                &&!filaSetores.includes(g.setor)
                &&!(g.tipo==="internados_bloqueando"&&g.setor==="PA 2")
                &&!(g.tipo==="internados_bloqueando"&&g.setor==="PA 1")
                &&g.tipo!=="box10")
              .map(g=>({crit:true,n:null,numColor:"#ef4444",borderColor:"#ef4444",
                titulo:`🚨 ${g.setor} — ${tinfo(g.tipo).label}`,ts:g.timestamp}));

            const gargaloMod=ativosDedup
              .filter(g=>efGrav(g)==="moderado"
                &&!filaSetores.includes(g.setor)
                &&!(g.tipo==="internados_bloqueando"&&g.setor==="PA 1")
                &&g.tipo!=="box10"
                &&!(g.tipo==="internados_bloqueando"&&g.setor==="PA 2"))
              .map(g=>({crit:false,n:null,numColor:"#f59e0b",borderColor:"#f59e0b55",
                titulo:`⚠️ ${g.setor} — ${tinfo(g.tipo).label}`,ts:g.timestamp}));

            const gargaloLeve=ativosDedup
              .filter(g=>efGrav(g)==="leve"
                &&!filaSetores.includes(g.setor)
                &&!(g.tipo==="internados_bloqueando"&&g.setor==="PA 1")
                &&g.tipo!=="box10"
                &&!(g.tipo==="internados_bloqueando"&&g.setor==="PA 2"))
              .map(g=>({crit:false,n:null,numColor:"#22c55e",borderColor:"#22c55e33",
                titulo:`✅ ${g.setor} — ${tinfo(g.tipo).label}`,ts:g.timestamp}));

            const todos=[...filaWidgets,...gargaloWidgets,...gargaloMod,...gargaloLeve];
            const criticos=todos.filter(w=>w.crit);
            const moderadosW=todos.filter(w=>!w.crit&&w.numColor==="#f59e0b");
            const levesW=todos.filter(w=>!w.crit&&w.numColor!=="#f59e0b");
            // Todos os críticos + completar até 5 com moderados depois leves
            const extraSlots=Math.max(0,5-criticos.length);
            const naocritsOrdenados=[...moderadosW,...levesW];
            const ordenados=[...criticos,...naocritsOrdenados.slice(0,extraSlots)];
            return ordenados.map((w,i)=>(
              <div key={i} style={{borderRadius:"12px",padding:"10px 12px",marginBottom:"10px",display:"flex",alignItems:"center",gap:"10px",backgroundColor:"#06070d",border:`2px solid ${w.borderColor}`,boxShadow:w.crit?`0 0 14px ${w.borderColor}55`:"none",overflow:"hidden",minWidth:0}}>
                {w.n!==null&&<>
                  <div style={{textAlign:"center",minWidth:"54px",flexShrink:0}}>
                    <div style={{fontSize:"36px",fontWeight:800,fontFamily:"JetBrains Mono,monospace",lineHeight:1,color:w.numColor}}>{w.n}</div>
                    <div style={{fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.5px",marginTop:"3px",color:"#64748b"}}>pacientes</div>
                  </div>
                  <div style={{width:"1px",height:"40px",background:w.borderColor,flexShrink:0}}/>
                </>}
                {w.n===null&&<div style={{width:"8px",height:"40px",borderRadius:"4px",background:w.numColor,flexShrink:0}}/>}
                <div style={{flex:1,minWidth:0,overflow:"hidden"}}>
                  <div style={{fontSize:"12px",fontWeight:700,color:"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w.titulo}</div>
                  {w.sub&&<div style={{fontSize:"11px",color:"#94a3b8",marginTop:"3px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w.sub}</div>}
                  {w.ts&&<div style={{fontSize:"10px",color:"#475569",marginTop:"4px",fontFamily:"JetBrains Mono,monospace"}}>{fmtH(w.ts)}</div>}
                </div>
              </div>
            ));
          })()}
          <div className="fls">{["todos","critico","moderado","internados",...SETORES].map(f=><button key={f} className={"fb"+(filtro===f?" on":"")} onClick={()=>setFiltro(f)}>{f==="todos"?"Todos":f==="critico"?"🔴 Críticos":f==="moderado"?"🟡 Moderados":f==="internados"?"🛏️ Internados":f}</button>)}</div>
          {gFilt.length===0?<div className="emp"><div className="ei">✅</div><div>Nenhum gargalo ativo</div></div>
          :gFilt.map(g=>(
            <div key={g.fbId} className={"gi "+efGrav(g)}>
              <div className="gtop"><div>
                <div className="gn">{g.setor}</div>
                <div className="gtp">
                  {g.tipo==="box10"
                    ? g.box10Status==="ocupada_internado"
                      ? "🏥 Box 10 — Ocupado com internado aguardando leito"
                      : g.box10Status==="ocupada_pa"
                      ? "🏥 Box 10 — Ocupado com paciente de atendimento PA"
                      : "🏥 Box 10 — Disponível"
                    : `${tinfo(g.tipo).icon} ${tinfo(g.tipo).label}`}
                </div>
              </div><span className={"bdg "+efGrav(g)}>{efGrav(g).toUpperCase()}</span></div>
              {(g.internados||0)>0&&<div style={{marginBottom:"7px"}}>
                <span style={{background:((g.internados||0)>=5&&g.setor==="PA 2")?"rgba(239,68,68,.15)":"rgba(251,191,36,.15)",border:`1px solid ${((g.internados||0)>=5&&g.setor==="PA 2")?"rgba(239,68,68,.3)":"rgba(251,191,36,.3)"}`,color:((g.internados||0)>=5&&g.setor==="PA 2")?"#fca5a5":"#fbbf24",borderRadius:"6px",padding:"2px 8px",fontSize:"11px",fontWeight:600,fontFamily:"JetBrains Mono"}}>
                  🛏️ {g.internados} internados aguardando leito{(g.internados||0)>=5&&g.setor==="PA 2"?" — CRÍTICO":""}
                </span>
              </div>}
              {(g.triFila||0)>0&&<div style={{marginBottom:"8px",display:"flex",alignItems:"center",gap:"8px"}}><span style={{fontSize:"22px",fontWeight:800,color:g.triFila>=5?"#ef4444":"#22c55e",fontFamily:"JetBrains Mono"}}>{g.triFila}</span><span style={{fontSize:"12px",color:g.triFila>=5?"#fca5a5":"#86efac"}}>na triagem{g.triFila>=5?" — abrir 2ª triagem":""}</span></div>}
              {(g.medFila||0)>0&&<div style={{marginBottom:"8px"}}><div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}><span style={{fontSize:"22px",fontWeight:800,color:g.medFila>=5?"#ef4444":"#f59e0b",fontFamily:"JetBrains Mono"}}>{g.medFila}</span><span style={{fontSize:"12px",color:g.medFila>=5?"#fca5a5":"#fbbf24"}}>aguardando medicação</span></div>{g.medMotivo?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{g.medMotivo.map(id=>{const m=MOT_MED.find(x=>x.id===id);return m?<span key={id} style={{fontSize:"10px",background:"rgba(245,158,11,.15)",color:"#f59e0b",border:"1px solid rgba(245,158,11,.3)",borderRadius:"6px",padding:"2px 6px"}}>{m.icon} {m.label}</span>:null;})}</div>}</div>}
              {(g.tcFila||0)>0&&<div style={{marginBottom:"8px",display:"flex",alignItems:"center",gap:"8px"}}><span style={{fontSize:"22px",fontWeight:800,color:g.tcFila>=5?"#ef4444":"#06b6d4",fontFamily:"JetBrains Mono"}}>{g.tcFila}</span><span style={{fontSize:"12px",color:g.tcFila>=5?"#fca5a5":"#a5f3fc"}}>aguardando TC{g.tcStatus?" · "+ST_TC.find(s=>s.id===g.tcStatus)?.label:""}</span></div>}
              {g.obs&&<div className="obt">"{g.obs}"</div>}
              <div className="gm"><span className="mi">👤 {g.usuario}</span><span className="mi">🕐 {fmtH(g.timestamp)}</span><span className="mi">⏱ há {tdec(g.timestamp)}</span></div>
              <button className="rvbtn" onClick={()=>resolver(g.fbId)}>✓ Marcar como resolvido</button>
            </div>
          ))}
        </>}

        {tab==="pacientes"&&<>
          {!addPac&&!editPac&&<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}><span style={{fontSize:"13px",color:"var(--tx2)"}}>{pacs.length} paciente{pacs.length!==1?"s":""} mapeado{pacs.length!==1?"s":""}</span><button className="btn" style={{width:"auto",padding:"8px 16px",fontSize:"13px"}} onClick={()=>setAddPac(true)}>+ Adicionar</button></div>
            <div className="fls">{["todos","PA 1","PA 2"].map(f=><button key={f} className={"fb"+(fpaPac===f?" on":"")} onClick={()=>setFpaPac(f)}>{f==="todos"?"Todos os PAs":f}</button>)}</div>
            {(()=>{const crit=pacs.filter(p=>p.cat==="critico_uti"&&(fpaPac==="todos"||p.pa===fpaPac));return crit.length>0&&<><div className="pac-sec" style={{color:"#ef4444"}}>🚨 Críticos / UTI — {crit.length}</div><div className="pac-grid">{crit.map(p=><div key={p.fbId} className="pc" style={{borderLeftColor:"#ef4444",background:"#1a0808"}} onClick={()=>setModalPac(p)}><div style={{fontSize:"13px",fontWeight:700,color:"#fff"}}>{p.nome}</div>{p.diag&&<div style={{fontSize:"11px",color:"#ffaaaa",marginTop:"1px"}}>{p.diag}</div>}<div style={{fontSize:"12px",fontWeight:700,fontFamily:"JetBrains Mono",marginTop:"5px",color:"#fff"}}>📍 {p.pa} · {p.box}</div><div><span style={{display:"inline-flex",alignItems:"center",gap:"4px",fontSize:"10px",fontWeight:600,padding:"2px 7px",borderRadius:"10px",marginTop:"5px",background:"#ef444430",color:"#fca5a5",border:"1px solid #ef444455"}}>🚨 Crítico/UTI</span></div><div style={{fontSize:"10px",color:"#ffaaaa",fontFamily:"JetBrains Mono",marginTop:"3px"}}>⏱ {tdec(p.ts)}</div></div>)}</div></>})()}
            {(()=>{const rec=pacs.filter(p=>p.cat==="recomendado"&&(fpaPac==="todos"||p.pa===fpaPac));return rec.length>0&&<><div className="pac-sec" style={{color:"#c9a84c"}}>⭐ Recomendados — {rec.length}</div><div className="pac-grid">{rec.map(p=><div key={p.fbId} className="pc" style={{borderLeftColor:"#c9a84c"}} onClick={()=>setModalPac(p)}><div style={{fontSize:"13px",fontWeight:700,color:"#fff"}}>{p.nome}</div>{p.diag&&<div style={{fontSize:"11px",color:"#d4b896",marginTop:"1px"}}>{p.diag}</div>}<div style={{fontSize:"12px",fontWeight:700,fontFamily:"JetBrains Mono",marginTop:"5px",color:"#e8d5b0"}}>📍 {p.pa} · {p.box}</div><div><span style={{display:"inline-flex",alignItems:"center",gap:"4px",fontSize:"10px",fontWeight:600,padding:"2px 7px",borderRadius:"10px",marginTop:"5px",background:"#c9a84c22",color:"#e8c97a",border:"1px solid #c9a84c44"}}>⭐ Recomendado</span></div><div style={{fontSize:"10px",color:"var(--tx2)",fontFamily:"JetBrains Mono",marginTop:"3px"}}>⏱ {tdec(p.ts)}</div></div>)}</div></>})()}
            {pacs.filter(p=>fpaPac==="todos"||p.pa===fpaPac).length===0&&<div className="emp"><div className="ei">🏥</div><div>Nenhum paciente mapeado</div></div>}
          </>}
          {(addPac||editPac)&&<FormPac ini={editPac} onSave={savePac} onCancel={()=>{setAddPac(false);setEditPac(null);}}/>}
          {modalPac&&<PacModal pac={modalPac} onClose={()=>setModalPac(null)} onDel={()=>delPac(modalPac.fbId)} onEdit={()=>{setEditPac(modalPac);setModalPac(null);}}/>}
        </>}

        {tab==="historico"&&<>
          <div className="card" style={{textAlign:"center",padding:"12px"}}><span style={{fontSize:"13px",color:"var(--tx2)"}}>{resolvidos.length} gargalo{resolvidos.length!==1?"s":""} resolvido{resolvidos.length!==1?"s":""}</span></div>
          {resolvidos.length===0?<div className="emp"><div className="ei">🗂️</div><div>Nenhum gargalo resolvido ainda</div></div>
          :[...resolvidos].sort((a,b)=>b.tsRes-a.tsRes).map(g=>(
            <div key={g.fbId} className="gi res">
              <div className="gtop"><div><div className="gn">{g.setor}</div><div className="gtp">{tinfo(g.tipo).icon} {tinfo(g.tipo).label}</div></div><span className="bdg res">RESOLVIDO</span></div>
              {g.obs&&<div className="obt">"{g.obs}"</div>}
              <div className="gm"><span className="mi">👤 {g.usuario}</span><span className="mi">🕐 {fmtDH(g.timestamp)}</span></div>
              {g.tsRes&&<div style={{marginTop:"6px",display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                <span className="rb">✓ Resolvido em {tdur(g.timestamp,g.tsRes)}</span>
                <button onClick={()=>reverter(g.fbId)} style={{padding:"3px 10px",borderRadius:"6px",border:"1px solid rgba(245,158,11,.3)",background:"rgba(245,158,11,.08)",color:"#f59e0b",fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"Space Grotesk,sans-serif"}}>↩ Reabrir</button>
              </div>}
            </div>
          ))}
        </>}

        {tab==="relatorio"&&<>
          <div className="rh"><img src={LOGO} alt="DF Star" style={{height:"38px",objectFit:"contain",marginBottom:"8px"}}/><div className="rt">Relatório de Gargalos</div><div className="rs">Hospital DF Star · Pronto Atendimento · 24h</div><div className="rs" style={{marginTop:"4px"}}>{new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long"})} · {turno()}</div></div>
          <div className="rss"><div className="rsc"><div className="rsv" style={{color:"var(--gold2)"}}>{g24.length}</div><div className="rsl">Total</div></div><div className="rsc"><div className="rsv" style={{color:"var(--gr)"}}>{pct}%</div><div className="rsl">Resolvidos</div></div><div className="rsc"><div className="rsv" style={{color:"var(--rd)"}}>{g24.filter(g=>efGrav(g)==="critico").length}</div><div className="rsl">Críticos</div></div><div className="rsc"><div className="rsv" style={{color:"var(--yw)"}}>{tmed} min</div><div className="rsl">Tempo médio</div></div></div>
          <div className="rss"><div className="rsc"><div className="rsv" style={{color:"#ef4444"}}>{pacs.filter(p=>p.cat==="critico_uti").length}</div><div className="rsl">🚨 Críticos UTI</div></div><div className="rsc"><div className="rsv" style={{color:"#c9a84c"}}>{pacs.filter(p=>p.cat==="recomendado").length}</div><div className="rsl">⭐ Recomendados</div></div></div>
          <div className="stt">🏥 Por setor</div>
          {porSet.length===0?<div style={{color:"var(--tx2)",fontSize:"13px",marginBottom:"10px"}}>Sem dados</div>:porSet.map(x=><div key={x.s} className="ri"><span className="rl">{x.s}</span><span className="rv">{x.n}×</span></div>)}
          <div className="stt">⚠️ Tipos frequentes</div>
          {porTip.length===0?<div style={{color:"var(--tx2)",fontSize:"13px",marginBottom:"10px"}}>Sem dados</div>:porTip.map(x=><div key={x.id} className="ri"><span className="rl">{x.icon} {x.label}</span><span className="rv">{x.n}×</span></div>)}
          <button className="exp" onClick={exportar}>⬇ Exportar relatório (.csv)</button>
          <div style={{fontSize:"11px",color:"var(--tx2)",textAlign:"center",marginTop:"6px",paddingBottom:"20px"}}>Arquivo pronto para apresentar à diretoria</div>
        </>}
      </div>
    </div>
  </>);
}

window.addEventListener("fb-ready",()=>{
  const root=ReactDOM.createRoot(document.getElementById("app"));
  root.render(React.createElement(App));
});
if(window.__db){
  const root=ReactDOM.createRoot(document.getElementById("app"));
  root.render(React.createElement(App));
}
</script>
</body>
</html>
